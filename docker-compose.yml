# ============================================
# Docker Compose for Spring Boot CRUD Application
# ============================================
#
# This docker-compose file sets up the application with:
# - Spring Boot application
# - MySQL database (optional - for production-like setup)
#
# Usage:
#   docker-compose up -d        # Start services in detached mode
#   docker-compose down         # Stop and remove services
#   docker-compose logs -f app  # View application logs
#   docker-compose build        # Rebuild the application
#
# ============================================

version: '3.8'

services:
  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crud-application
    ports:
      - "8080:8080"
    environment:
      # Application configuration
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=docker
      
      # Database configuration (using H2 for standalone mode)
      # Uncomment below for MySQL configuration
      # - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/cruddb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      # - SPRING_DATASOURCE_USERNAME=root
      # - SPRING_DATASOURCE_PASSWORD=password
      # - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      
      # JVM options
      - JAVA_OPTS=-Xmx512m -Xms256m
    restart: unless-stopped
    networks:
      - crud-network
    # Uncomment below if using MySQL
    # depends_on:
    #   - mysql
    #   mysql:
    #     condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/users/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 60s

  # MySQL Database (Optional - uncomment to use)
  # mysql:
  #   image: mysql:8.0
  #   container_name: crud-mysql
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     - MYSQL_ROOT_PASSWORD=password
  #     - MYSQL_DATABASE=cruddb
  #     - MYSQL_USER=cruduser
  #     - MYSQL_PASSWORD=crudpass
  #   volumes:
  #     - mysql-data:/var/lib/mysql
  #   restart: unless-stopped
  #   networks:
  #     - crud-network
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #     start_period: 30s

# Named volumes for data persistence
# volumes:
#   mysql-data:
#     driver: local

# Custom network for service communication
networks:
  crud-network:
    driver: bridge
